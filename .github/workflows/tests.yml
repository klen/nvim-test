name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        neovim:
          - v0.11.0
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - uses: notomo/action-setup-nvim-lua@v2
        with:
          luarocks-version: '3.12.2'

      - uses: rhysd/action-setup-vim@v1
        id: vim
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Cache tree-sitter parsers
        id: cache-parsers
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/site/parser
          key: ts-parsers-${{ runner.os }}-${{ hashFiles('.github/workflows/tests.yml') }}

      - name: Build tree-sitter parsers
        if: steps.cache-parsers.outputs.cache-hit != 'true'
        run: |
          PARSER_DIR="${HOME}/.local/share/nvim/site/parser"
          mkdir -p "${PARSER_DIR}"
          for lang in c_sharp dart go haskell javascript lua python ruby rust typescript zig; do
            SO="${PARSER_DIR}/${lang}.so"
            repo="tree-sitter-${lang}"
            [ "${lang}" = "c_sharp" ] && repo="tree-sitter-c-sharp"
            [ "${lang}" = "typescript" ] && repo="tree-sitter-typescript"
            echo "Building ${lang}..."
            TMP="/tmp/ts-${lang}"
            rm -rf "${TMP}"
            if [ "${lang}" = "dart" ]; then
              git clone --depth=1 "https://github.com/UserNobody14/${repo}" "${TMP}" 2>/dev/null || true
            else
              git clone --depth=1 "https://github.com/tree-sitter/${repo}" "${TMP}" 2>/dev/null || \
              git clone --depth=1 "https://github.com/tree-sitter-grammars/${repo}" "${TMP}" 2>/dev/null || true
            fi
            if [ -d "${TMP}" ]; then
              for subd in . typescript; do
                (cd "${TMP}/${subd}" 2>/dev/null && tree-sitter build -o "${SO}" . 2>/dev/null) && break
              done
              if [ ! -f "${SO}" ]; then
                echo "::warning::Failed to build parser for ${lang}"
              fi
              rm -rf "${TMP}"
            else
              echo "::warning::Failed to clone repo for ${lang}"
            fi
          done
          echo "Installed parsers:"
          ls -la "${PARSER_DIR}"

      - name: Install vusted
        run: luarocks install vusted

      - name: Run tests
        run: make test
        env:
          VUSTED_NVIM: ${{ steps.vim.outputs.executable }}
